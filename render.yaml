databases:
  # ---------------------------------------------------------------------------
  # RENDER POSTGRESQL DATABASE
  # ---------------------------------------------------------------------------
  - name: tobacco-tracker-db
    plan: free
    databaseName: tobacco_tracker
    user: tobacco_tracker_user

services:
  # ---------------------------------------------------------------------------
  # 1. APPLICATION CONTAINER (Web Service)
  # ---------------------------------------------------------------------------
  - type: web
    name: tobacco-tracker-app
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: nextjs/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tobacco-tracker-db
          property: connectionString
      - key: NODE_ENV
        value: production

  # ---------------------------------------------------------------------------
  # 2. INTERNAL ANALYTICS / MCP CONTAINER (Private Service)
  # ---------------------------------------------------------------------------
  - type: pvt
    name: tobacco-tracker-mcp
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: mcp/gemini/Dockerfile
    envVars:
      - key: GEMINI_API_KEY
        fromEnvVar: GEMINI_API_KEY
