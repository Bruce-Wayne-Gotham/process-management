name: Keepalive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -fsS https://process-management-4t4o.onrender.com/api/health \
            -o /dev/null \
            --max-time 30 \
            && echo "Service is up" \
            || echo "Service did not respond (may be cold-starting)"
